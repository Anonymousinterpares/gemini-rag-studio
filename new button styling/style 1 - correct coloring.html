
<div style="min-height:260px;display:flex;align-items:center;justify-content:center;background:#07070f;border-radius:12px;">

  <div style="position:relative;display:inline-flex;align-items:center;justify-content:center;">

    <!-- Left external border glow -->
    <div id="glow-l" style="
      position:absolute;left:50%;top:50%;
      width:calc(100% + 9px);height:calc(100% + 9px);
      transform:translate(-50%,-50%);
      border-radius:100px;
      pointer-events:none;
      opacity:0;
      will-change:opacity;
    ">
      <div style="
        position:relative;width:100%;height:100%;border-radius:100px;
        background:radial-gradient(ellipse 55% 100% at 10% 50%, rgba(232,120,40,0.72) 0%, rgba(220,100,30,0.35) 40%, transparent 75%);
      "></div>
    </div>

    <!-- Right external border glow (mirrored) -->
    <div id="glow-r" style="
      position:absolute;left:50%;top:50%;
      width:calc(100% + 9px);height:calc(100% + 9px);
      transform:translate(-50%,-50%) scaleX(-1);
      border-radius:100px;
      pointer-events:none;
      opacity:0;
      will-change:opacity;
    ">
      <div style="
        position:relative;width:100%;height:100%;border-radius:100px;
        background:radial-gradient(ellipse 55% 100% at 10% 50%, rgba(232,120,40,0.72) 0%, rgba(220,100,30,0.35) 40%, transparent 75%);
      "></div>
    </div>

    <!-- Button -->
    <a id="btn" href="#" onclick="return false;" style="
      position:relative;z-index:10;overflow:hidden;
      display:inline-flex;align-items:center;justify-content:center;
      height:40px;padding:0 64px;
      border-radius:100px;
      border:1px solid rgba(255,255,255,0.6);
      background:#d1d1d1;
      font-family:'Inter',system-ui,sans-serif;
      font-size:12px;font-weight:700;
      letter-spacing:-0.015em;text-transform:uppercase;
      color:#5A250A;text-decoration:none;
      white-space:nowrap;
      cursor:pointer;
      gap:4px;
    ">
      <!-- Moving glow spot container -->
      <div id="spot-wrap" style="
        position:absolute;z-index:-10;
        display:flex;align-items:center;justify-content:center;
        width:204px;
        will-change:transform;
        pointer-events:none;
      ">
        <!-- Tight circular spot: white → peach → gold → salmon → transparent -->
        <div style="
          position:absolute;top:50%;
          width:121px;height:121px;
          transform:translateY(-50%);
          border-radius:50%;
          background:radial-gradient(50% 50% at 50% 50%,
            #FFFFF5 3.5%,
            #FFAA81 26.5%,
            #FFDA9F 37.5%,
            rgba(255,170,129,0.50) 49%,
            rgba(210,106,58,0.00) 92.5%
          );
        "></div>
        <!-- Wide soft oval with blur: white → cream → peach → transparent -->
        <div style="
          position:absolute;top:50%;
          width:204px;height:103px;
          transform:translateY(-50%);
          background:radial-gradient(43.3% 44.23% at 50% 49.51%,
            #FFFFF7 29%,
            #FFFACD 48.5%,
            #F4D2BF 60.71%,
            rgba(214,211,210,0.00) 100%
          );
          filter:blur(5px);
        "></div>
      </div>

      <span style="position:relative;">See in Action</span>
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 9" style="height:9px;width:17px;color:#5A250A;flex-shrink:0;position:relative;">
        <path fill="currentColor" fill-rule="evenodd" d="m12.495 0 4.495 4.495-4.495 4.495-.99-.99 2.805-2.805H0v-1.4h14.31L11.505.99z" clip-rule="evenodd"/>
      </svg>
    </a>

  </div>
</div>

<script>
const btn      = document.getElementById('btn');
const spotWrap = document.getElementById('spot-wrap');
const glowL    = document.getElementById('glow-l');
const glowR    = document.getElementById('glow-r');

btn.addEventListener('mousemove', e => {
  const r  = btn.getBoundingClientRect();
  const mx = e.clientX - r.left;          // 0 → W
  const W  = r.width;
  const cx = W / 2;

  // Spot follows mouse X, offset from center
  const tx = mx - cx;
  spotWrap.style.transform = `translateX(${tx.toFixed(1)}px) translateZ(0)`;

  // Edge proximity: 0 at center, 1 at each edge
  const proxL = Math.max(0, 1 - (mx / W) * 3.2);
  const proxR = Math.max(0, 1 - ((W - mx) / W) * 3.2);

  glowL.style.opacity = proxL.toFixed(3);
  glowR.style.opacity = proxR.toFixed(3);
});

btn.addEventListener('mouseleave', () => {
  glowL.style.opacity = '0';
  glowR.style.opacity = '0';
});
</script>
