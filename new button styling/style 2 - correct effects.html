
<div style="min-height:260px;display:flex;align-items:center;justify-content:center;background:#07070f;border-radius:12px;">
  <div style="position:relative;display:inline-flex;">
    <button id="btn" style="
      position:relative;overflow:hidden;
      padding:15px 40px;
      border-radius:100px;
      border:1px solid rgba(255,255,255,0.22);
      background:rgba(238,228,208,0.88);
      cursor:pointer;
      font-family:'Inter',system-ui,sans-serif;
      font-size:13px;font-weight:700;
      letter-spacing:0.09em;text-transform:uppercase;
      color:#3a1e06;
      white-space:nowrap;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.6);
      outline:none;
      transition:box-shadow .12s ease;
    ">
      <canvas id="cvs" style="position:absolute;inset:0;pointer-events:none;border-radius:100px;opacity:0;transition:opacity .18s ease;"></canvas>
      <span style="position:relative;z-index:1;display:flex;align-items:center;gap:10px;">
        SEE IN ACTION
        <svg width="15" height="15" viewBox="0 0 15 15" fill="none" style="flex-shrink:0">
          <path stroke="#3a1e06" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 7.5h9M8.5 4l3.5 3.5L8.5 11"/>
        </svg>
      </span>
    </button>
  </div>
</div>

<script>
const btn = document.getElementById('btn');
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');
const ORA = '232, 102, 26';

let mx = 0, my = 0, inside = false;

function resize() {
  cvs.width  = btn.offsetWidth;
  cvs.height = btn.offsetHeight;
}
resize();
new ResizeObserver(resize).observe(btn);

function drawSpot() {
  const W = cvs.width, H = cvs.height;
  ctx.clearRect(0, 0, W, H);
  if (!inside) return;

  const r = Math.max(W, H) * 0.9;
  const g = ctx.createRadialGradient(mx, my, 0, mx, my, r);
  g.addColorStop(0,    `rgba(${ORA}, 0.72)`);
  g.addColorStop(0.22, `rgba(${ORA}, 0.42)`);
  g.addColorStop(0.55, `rgba(${ORA}, 0.10)`);
  g.addColorStop(1,    `rgba(${ORA}, 0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.roundRect(0, 0, W, H, H / 2);
  ctx.fill();

  requestAnimationFrame(drawSpot);
}

btn.addEventListener('mouseenter', () => {
  inside = true;
  cvs.style.opacity = '1';
  btn.style.background = 'rgba(252,244,225,0.97)';
  requestAnimationFrame(drawSpot);
});

btn.addEventListener('mousemove', e => {
  const r   = btn.getBoundingClientRect();
  mx = e.clientX - r.left;
  my = e.clientY - r.top;
  const W   = r.width;

  const proxL = Math.max(0, 1 - (mx / W) * 4);
  const proxR = Math.max(0, 1 - ((W - mx) / W) * 4);
  const sL = Math.round(proxL * 55);
  const sR = Math.round(proxR * 55);
  const aL = (proxL * 0.78).toFixed(2);
  const aR = (proxR * 0.78).toFixed(2);

  const shadows = [
    `inset 0 1px 0 rgba(255,255,255,0.75)`,
    `0 0 24px 8px rgba(${ORA},0.38)`
  ];
  if (proxL > 0.02) shadows.push(`-${Math.round(sL*0.5)}px 0 ${sL}px rgba(${ORA},${aL})`);
  if (proxR > 0.02) shadows.push(` ${Math.round(sR*0.5)}px 0 ${sR}px rgba(${ORA},${aR})`);
  btn.style.boxShadow = shadows.join(', ');
});

btn.addEventListener('mouseleave', () => {
  inside = false;
  cvs.style.opacity = '0';
  btn.style.background = 'rgba(238,228,208,0.88)';
  btn.style.boxShadow  = 'inset 0 1px 0 rgba(255,255,255,0.6)';
  ctx.clearRect(0, 0, cvs.width, cvs.height);
});

btn.addEventListener('mousedown', () => btn.style.transform = 'scale(0.97)');
btn.addEventListener('mouseup',   () => btn.style.transform = 'scale(1)');
</script>
