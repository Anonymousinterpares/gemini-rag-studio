<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Button Tweaker — Pro Effects</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Inter',sans-serif;background:#07070f;color:#fff;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:flex-start;
  padding:0 0 80px;-webkit-font-smoothing:antialiased;
}
header{
  width:100%;padding:28px 40px 24px;
  border-bottom:1px solid rgba(255,255,255,0.07);
  display:flex;align-items:center;gap:12px;
}
header h1{font-size:15px;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,0.85);}
header .sub{font-size:12px;font-weight:400;color:rgba(255,255,255,0.3);letter-spacing:.02em;}
header .badge{
  margin-left:auto;padding:4px 10px;border-radius:100px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  font-size:10.5px;font-weight:600;letter-spacing:.06em;
  color:rgba(255,255,255,0.35);text-transform:uppercase;
}
.stage{
  width:100%;max-width:920px;display:flex;flex-direction:column;
  align-items:center;gap:0;padding:80px 40px 0;
}

/* ── BUTTON ── */
.btn-scene{
  position:relative;display:inline-flex;
  align-items:center;justify-content:center;margin-bottom:80px;
}
button#main-btn{
  position:relative;overflow:hidden;
  padding:15px 40px;border-radius:100px;cursor:pointer;
  font-family:'Inter',sans-serif;font-size:13px;font-weight:700;
  letter-spacing:0.09em;text-transform:uppercase;white-space:nowrap;outline:none;
  transition:transform .12s ease, background .15s ease, box-shadow .12s ease;
  will-change:transform,box-shadow;
}
button#main-btn canvas{
  position:absolute;inset:0;pointer-events:none;border-radius:100px;
  opacity:0;transition:opacity .18s ease;
}
button#main-btn span.btn-label{
  position:relative;z-index:2;display:flex;align-items:center;gap:10px;
  transition:text-shadow .05s, transform .05s;
}
button#main-btn:active{transform:scale(0.97);}

/* Glitch text chromatic aberration */
button#main-btn.glitch-burst span.btn-label{
  animation:glitch-rgb 0.14s steps(3) forwards;
}
@keyframes glitch-rgb{
  0%  {text-shadow:2px 0 rgba(255,0,80,0.9), -2px 0 rgba(0,200,255,0.9); transform:translate(0);}
  20% {text-shadow:-3px 0 rgba(255,0,80,0.9), 3px 0 rgba(0,200,255,0.9); transform:translate(2px,-1px);}
  40% {text-shadow:3px 1px rgba(255,0,80,0.9), -3px -1px rgba(0,200,255,0.9); transform:translate(-2px,1px);}
  60% {text-shadow:-1px 2px rgba(0,255,140,0.8), 1px -2px rgba(255,0,80,0.8); transform:translate(1px,2px);}
  80% {text-shadow:2px -1px rgba(0,200,255,0.9), -2px 1px rgba(255,0,80,0.9); transform:translate(-1px,-1px);}
  100%{text-shadow:none; transform:translate(0);}
}
button#main-btn.glitch-burst{
  animation:glitch-shake 0.14s linear forwards;
}
@keyframes glitch-shake{
  0%  {filter:none;}
  15% {filter:hue-rotate(25deg) saturate(2.5) brightness(1.3);}
  30% {filter:hue-rotate(-15deg) saturate(1.5) contrast(1.4);}
  50% {filter:hue-rotate(40deg) brightness(1.5) saturate(3);}
  70% {filter:hue-rotate(-30deg) saturate(2);}
  85% {filter:hue-rotate(10deg) brightness(1.2);}
  100%{filter:none;}
}

/* ── PANEL ── */
.panel{
  width:100%;max-width:800px;
  background:rgba(255,255,255,0.035);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;padding:32px 36px;
  display:grid;grid-template-columns:1fr 1fr;gap:0 48px;
}
.panel-col{display:flex;flex-direction:column;gap:0}
.col-title{
  font-size:10.5px;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:rgba(255,255,255,0.3);
  margin-bottom:22px;padding-bottom:12px;
  border-bottom:1px solid rgba(255,255,255,0.07);
}
.col-title + .col-title{margin-top:8px;}
.ctrl{display:flex;flex-direction:column;gap:6px;margin-bottom:22px;}
.ctrl-row{display:flex;align-items:center;justify-content:space-between;}
.ctrl label{font-size:13px;font-weight:500;color:rgba(255,255,255,0.65);}
.ctrl-val{font-size:12px;font-weight:500;font-family:monospace;color:rgba(255,255,255,0.4);min-width:52px;text-align:right;}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:4px;
  background:rgba(255,255,255,0.1);border-radius:2px;outline:none;cursor:pointer;margin-top:4px;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#fff;box-shadow:0 0 0 3px rgba(255,255,255,0.15);
  cursor:pointer;transition:box-shadow .15s;
}
input[type=range]::-webkit-slider-thumb:hover{box-shadow:0 0 0 5px rgba(255,255,255,0.22);}
input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:#fff;border:none;cursor:pointer;}
.color-row{display:flex;align-items:center;gap:10px;margin-top:4px;}
input[type=color]{
  -webkit-appearance:none;appearance:none;width:32px;height:32px;border:none;
  border-radius:8px;cursor:pointer;padding:0;background:none;overflow:hidden;
  box-shadow:0 0 0 1px rgba(255,255,255,0.12);
}
input[type=color]::-webkit-color-swatch-wrapper{padding:0}
input[type=color]::-webkit-color-swatch{border:none;border-radius:6px}
.color-hex{font-size:12px;font-family:monospace;color:rgba(255,255,255,0.4);letter-spacing:.04em;}
.divider{width:1px;background:rgba(255,255,255,0.07);margin:0 -24px;}
button.reset{
  padding:8px 20px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);font-size:12.5px;font-weight:500;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.02em;
}
button.reset:hover{background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.75);}

/* ── EFFECTS SECTION ── */
.fx-section{
  grid-column:1/-1;margin-top:28px;padding-top:24px;
  border-top:1px solid rgba(255,255,255,0.07);
}
.fx-chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px;}
.chip{
  padding:7px 16px;border-radius:100px;
  border:1px solid rgba(255,255,255,0.1);
  background:rgba(255,255,255,0.03);
  color:rgba(255,255,255,0.4);font-size:12px;font-weight:500;
  font-family:'Inter',sans-serif;cursor:pointer;
  transition:all .2s ease;letter-spacing:.03em;white-space:nowrap;
  position:relative;overflow:hidden;
}
.chip::before{
  content:'';position:absolute;inset:0;opacity:0;
  transition:opacity .2s;
  background:radial-gradient(circle at 50% 0%,rgba(255,255,255,0.15),transparent 70%);
}
.chip:hover{color:rgba(255,255,255,0.75);border-color:rgba(255,255,255,0.2);}
.chip:hover::before{opacity:1;}
.chip.active{color:#fff;border-color:rgba(255,255,255,0.3);background:rgba(255,255,255,0.1);}

.chip[data-effect="electric"].active{
  background:rgba(80,140,255,0.18);border-color:rgba(100,160,255,0.55);color:#a8d0ff;
  box-shadow:0 0 12px rgba(80,140,255,0.3), inset 0 1px 0 rgba(140,180,255,0.25);
}
.chip[data-effect="crack"].active{
  background:rgba(255,100,20,0.18);border-color:rgba(255,130,40,0.55);color:#ffb07a;
  box-shadow:0 0 12px rgba(255,100,20,0.3), inset 0 1px 0 rgba(255,160,80,0.2);
}
.chip[data-effect="plasma"].active{
  background:rgba(150,40,255,0.18);border-color:rgba(180,80,255,0.55);color:#c890ff;
  box-shadow:0 0 12px rgba(150,40,255,0.3), inset 0 1px 0 rgba(200,120,255,0.2);
}
.chip[data-effect="glitch"].active{
  background:rgba(0,255,100,0.12);border-color:rgba(0,255,140,0.45);color:#60ffaa;
  box-shadow:0 0 12px rgba(0,255,100,0.25), inset 0 1px 0 rgba(60,255,160,0.2);
}
.fx-hint{
  margin-top:10px;font-size:11.5px;
  color:rgba(255,255,255,0.22);letter-spacing:.02em;
  min-height:16px;transition:color .3s;
}
/* ── EXPORT SECTION ── */
.export-section{
  grid-column:1/-1;margin-top:24px;padding-top:22px;
  border-top:1px solid rgba(255,255,255,0.07);
}
.export-row{display:flex;align-items:center;gap:10px;margin-top:16px;flex-wrap:wrap;}
.export-btn{
  display:inline-flex;align-items:center;gap:7px;
  padding:8px 18px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);
  color:rgba(255,255,255,0.6);font-size:12.5px;font-weight:500;
  font-family:'Inter',sans-serif;cursor:pointer;transition:all .15s;letter-spacing:.02em;
}
.export-btn:hover{background:rgba(255,255,255,0.11);color:#fff;border-color:rgba(255,255,255,0.22);}
.export-btn svg{opacity:.7;}
.export-btn:hover svg{opacity:1;}
.export-hint{
  font-size:11.5px;color:rgba(255,255,255,0.22);letter-spacing:.02em;
  opacity:0;transition:opacity .4s;
}
.export-hint.show{opacity:1;}
</style>
</head>
<body>

<header>
  <h1>Button Tweaker</h1>
  <span class="sub">— hover or click the button to preview effects</span>
  <span class="badge">Pro Edition</span>
</header>

<div class="stage">
  <div class="btn-scene">
    <button id="main-btn">
      <canvas id="cvs"></canvas>
      <span class="btn-label">
        SEE IN ACTION
        <svg id="arrow-svg" width="15" height="15" viewBox="0 0 15 15" fill="none">
          <path id="arrow-path" stroke="#3a1e06" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" d="M3 7.5h9M8.5 4l3.5 3.5L8.5 11"/>
        </svg>
      </span>
    </button>
  </div>

  <div class="panel">

    <!-- LEFT -->
    <div class="panel-col">
      <div class="col-title">Surface &amp; Glow</div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Base button color</label></div>
        <div class="color-row">
          <input type="color" id="c-base" value="#eee4d0"/>
          <span class="color-hex" id="h-base">#eee4d0</span>
        </div>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Base opacity</label><span class="ctrl-val" id="v-base-a">88%</span></div>
        <input type="range" id="s-base-a" min="20" max="100" step="1" value="88"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Hover brightness</label><span class="ctrl-val" id="v-hover-b">+8%</span></div>
        <input type="range" id="s-hover-b" min="0" max="30" step="1" value="8"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Glow / spot color</label></div>
        <div class="color-row">
          <input type="color" id="c-glow" value="#e8661a"/>
          <span class="color-hex" id="h-glow">#e8661a</span>
        </div>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Spot intensity</label><span class="ctrl-val" id="v-spot">72%</span></div>
        <input type="range" id="s-spot" min="10" max="100" step="1" value="72"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Spot radius</label><span class="ctrl-val" id="v-radius">90%</span></div>
        <input type="range" id="s-radius" min="40" max="160" step="1" value="90"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Outer glow base</label><span class="ctrl-val" id="v-outer">38%</span></div>
        <input type="range" id="s-outer" min="0" max="100" step="1" value="38"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Edge leak intensity</label><span class="ctrl-val" id="v-edge">78%</span></div>
        <input type="range" id="s-edge" min="0" max="100" step="1" value="78"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Edge leak spread</label><span class="ctrl-val" id="v-spread">55px</span></div>
        <input type="range" id="s-spread" min="10" max="120" step="1" value="55"/>
      </div>
    </div>

    <div class="divider"></div>

    <!-- RIGHT -->
    <div class="panel-col">
      <div class="col-title">Typography</div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Font color</label></div>
        <div class="color-row">
          <input type="color" id="c-font" value="#3a1e06"/>
          <span class="color-hex" id="h-font">#3a1e06</span>
        </div>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Font size</label><span class="ctrl-val" id="v-fsize">13px</span></div>
        <input type="range" id="s-fsize" min="9" max="20" step="1" value="13"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Font weight</label><span class="ctrl-val" id="v-fweight">700</span></div>
        <input type="range" id="s-fweight" min="300" max="900" step="100" value="700"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Letter spacing</label><span class="ctrl-val" id="v-tracking">0.09em</span></div>
        <input type="range" id="s-tracking" min="0" max="30" step="1" value="9"/>
      </div>
      <div class="col-title" style="margin-top:8px;">Border &amp; Shape</div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Border color</label></div>
        <div class="color-row">
          <input type="color" id="c-border" value="#ffffff"/>
          <span class="color-hex" id="h-border">#ffffff</span>
        </div>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Border opacity</label><span class="ctrl-val" id="v-border-a">22%</span></div>
        <input type="range" id="s-border-a" min="0" max="100" step="1" value="22"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Padding H</label><span class="ctrl-val" id="v-padh">40px</span></div>
        <input type="range" id="s-padh" min="10" max="80" step="1" value="40"/>
      </div>
      <div class="ctrl">
        <div class="ctrl-row"><label>Padding V</label><span class="ctrl-val" id="v-padv">15px</span></div>
        <input type="range" id="s-padv" min="6" max="36" step="1" value="15"/>
      </div>
    </div>

    <!-- EFFECTS -->
    <div class="fx-section">
      <div class="col-title">Special Effects</div>
      <div class="fx-chips">
        <button class="chip active" data-effect="none">None</button>
        <button class="chip" data-effect="electric">⚡ Electric Shock</button>
        <button class="chip" data-effect="crack">💥 Surface Crack</button>
        <button class="chip" data-effect="plasma">🌀 Plasma Field</button>
        <button class="chip" data-effect="glitch">▓ Glitch</button>
      </div>
      <div class="fx-hint" id="fx-hint">Standard hover glow — use controls above to tweak.</div>
    </div>

    <!-- EXPORT -->
    <div class="export-section">
      <div class="col-title">Export</div>
      <div class="export-row">
        <button class="export-btn" onclick="downloadCSS()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v8M3 6.5l3.5 3.5L10 6.5M1.5 11.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download CSS
        </button>
        <button class="export-btn" onclick="downloadHTML()">
          <svg width="13" height="13" viewBox="0 0 13 13" fill="none"><path d="M6.5 1v8M3 6.5l3.5 3.5L10 6.5M1.5 11.5h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Download HTML
        </button>
        <span class="export-hint" id="export-hint"></span>
      </div>
    </div>

    <button class="reset" onclick="resetDefaults()"
      style="grid-column:1/-1;margin-top:24px;padding-top:0;align-self:end;width:fit-content;margin-left:auto;">
      Reset to defaults
    </button>
  </div>
</div>

<script>
'use strict';
const btn = document.getElementById('main-btn');
const cvs = document.getElementById('cvs');
const ctx = cvs.getContext('2d');

let mouseX = 0, mouseY = 0, hovering = false;
let rafId  = null;
let effectMode = 'none';

// ── State ─────────────────────────────────────────────────────
const S = {
  baseColor:'#eee4d0', baseAlpha:88, hoverBoost:8,
  glowColor:'#e8661a', spotAlpha:72, spotRadius:90,
  outerGlow:38,        edgeAlpha:78, edgeSpread:55,
  fontColor:'#3a1e06', fontSize:13,  fontWeight:700,
  tracking:9,          borderColor:'#ffffff', borderAlpha:22,
  padH:40,             padV:15,
};
const DEFAULTS = {...S};

// ── Helpers ───────────────────────────────────────────────────
function hexToRgb(hex) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '255,255,255';
}
function lightenHex(hex, pct) {
  const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
  if (!r) return hex;
  const clamp = v => Math.min(255, Math.round(v + v*(pct/100)));
  return '#'+[parseInt(r[1],16),parseInt(r[2],16),parseInt(r[3],16)]
    .map(c => clamp(c).toString(16).padStart(2,'0')).join('');
}
function rand(a, b) { return a + Math.random()*(b-a); }

function applyBtn() {
  const a    = S.baseAlpha/100;
  const rgb  = hexToRgb(S.baseColor);
  btn.style.background    = `rgba(${rgb},${a})`;
  btn.style.color         = S.fontColor;
  btn.style.fontSize      = S.fontSize+'px';
  btn.style.fontWeight    = S.fontWeight;
  btn.style.letterSpacing = (S.tracking/100).toFixed(2)+'em';
  btn.style.padding       = `${S.padV}px ${S.padH}px`;
  const ba  = S.borderAlpha/100;
  const brg = hexToRgb(S.borderColor);
  btn.style.border        = `1px solid rgba(${brg},${ba})`;
  btn.style.boxShadow     = `inset 0 1px 0 rgba(255,255,255,0.6)`;
  document.getElementById('arrow-path').setAttribute('stroke', S.fontColor);
}
function resize() {
  cvs.width  = btn.offsetWidth;
  cvs.height = btn.offsetHeight;
}

// ── Cursor spot (base layer) ──────────────────────────────────
function drawSpot() {
  const W = cvs.width, H = cvs.height;
  const glowRgb = hexToRgb(S.glowColor);
  const r  = Math.max(W,H)*(S.spotRadius/100);
  const a0 = (S.spotAlpha/100).toFixed(2);
  const a1 = (S.spotAlpha/100*0.58).toFixed(2);
  const a2 = (S.spotAlpha/100*0.14).toFixed(2);
  const g  = ctx.createRadialGradient(mouseX,mouseY,0, mouseX,mouseY,r);
  g.addColorStop(0,    `rgba(${glowRgb},${a0})`);
  g.addColorStop(0.22, `rgba(${glowRgb},${a1})`);
  g.addColorStop(0.55, `rgba(${glowRgb},${a2})`);
  g.addColorStop(1,    `rgba(${glowRgb},0)`);
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.roundRect(0,0,W,H,H/2);
  ctx.fill();
}
function updateEdgeGlow() {
  const W = cvs.width;
  const glowRgb = hexToRgb(S.glowColor);
  const proxL = Math.max(0, 1-(mouseX/W)*4);
  const proxR = Math.max(0, 1-((W-mouseX)/W)*4);
  const sp = S.edgeSpread;
  const sL = Math.round(proxL*sp), sR = Math.round(proxR*sp);
  const ea = S.edgeAlpha/100;
  const aL = (proxL*ea).toFixed(2), aR = (proxR*ea).toFixed(2);
  const oa = (S.outerGlow/100).toFixed(2);
  const shadows = [
    `inset 0 1px 0 rgba(255,255,255,0.75)`,
    `0 0 24px 8px rgba(${glowRgb},${oa})`,
  ];
  if (proxL>0.02) shadows.push(`-${Math.round(sL*0.5)}px 0 ${sL}px rgba(${glowRgb},${aL})`);
  if (proxR>0.02) shadows.push(` ${Math.round(sR*0.5)}px 0 ${sR}px rgba(${glowRgb},${aR})`);
  btn.style.boxShadow = shadows.join(', ');
}

// ════════════════════════════════════════════════════════════
//  ⚡  ELECTRIC SHOCK
// ════════════════════════════════════════════════════════════
const Electric = (() => {
  let bolts = [], lastSpawn = 0;

  function perimeter(W, H) {
    const p = Math.random()*2*(W+H);
    if (p < W)     return {x:p,     y:0  };
    if (p < W+H)   return {x:W,     y:p-W};
    if (p < 2*W+H) return {x:W-(p-W-H),   y:H};
    return               {x:0,     y:H-(p-2*W-H)};
  }

  // Recursive midpoint displacement — the real deal
  function segment(x1,y1, x2,y2, rough, depth) {
    if (depth <= 0) return [{x:x1,y:y1},{x:x2,y:y2}];
    const mx = (x1+x2)*0.5 + (Math.random()-0.5)*rough;
    const my = (y1+y2)*0.5 + (Math.random()-0.5)*rough;
    return [
      ...segment(x1,y1, mx,my, rough*0.58, depth-1),
      ...segment(mx,my, x2,y2, rough*0.58, depth-1),
    ];
  }

  function spawnBolt(W, H) {
    const p1 = perimeter(W,H), p2 = perimeter(W,H);
    const rough = Math.min(W,H)*(0.18+Math.random()*0.28);
    const main  = segment(p1.x,p1.y, p2.x,p2.y, rough, 5);
    const branches = [];
    const nb = 1+Math.floor(Math.random()*3);
    for (let i=0;i<nb;i++) {
      const idx = Math.floor(main.length*(0.25+Math.random()*0.5));
      const pt  = main[idx];
      const ang = Math.atan2(p2.y-p1.y, p2.x-p1.x) + rand(-1.2, 1.2);
      const len = rand(12, 40);
      branches.push(segment(pt.x,pt.y, pt.x+Math.cos(ang)*len, pt.y+Math.sin(ang)*len, len*0.4, 3));
    }
    return {main, branches, born:performance.now(), life:rand(160,320)};
  }

  function drawPath(path, alpha, coreW, colRgb, glowBlur) {
    if (path.length < 2) return;
    ctx.save();
    // Outer soft glow
    ctx.globalAlpha  = alpha*0.55;
    ctx.strokeStyle  = `rgba(${colRgb},1)`;
    ctx.lineWidth    = coreW*4;
    ctx.lineCap = ctx.lineJoin = 'round';
    ctx.shadowColor  = `rgba(${colRgb},1)`;
    ctx.shadowBlur   = glowBlur*2.5;
    ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
    for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
    ctx.stroke();
    // Mid glow
    ctx.globalAlpha = alpha*0.75;
    ctx.strokeStyle = `rgba(200,225,255,1)`;
    ctx.lineWidth   = coreW*1.8;
    ctx.shadowBlur  = glowBlur;
    ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
    for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
    ctx.stroke();
    // White core
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'rgba(255,255,255,1)';
    ctx.lineWidth   = coreW;
    ctx.shadowBlur  = 0;
    ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
    for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
    ctx.stroke();
    ctx.restore();
  }

  return {
    reset() { bolts=[]; lastSpawn=0; },
    render(W, H) {
      const now = performance.now();
      if (now-lastSpawn > rand(65,145)) {
        bolts.push(spawnBolt(W,H));
        if (Math.random()<0.4) bolts.push(spawnBolt(W,H));
        lastSpawn = now;
      }
      bolts = bolts.filter(b => now-b.born < b.life);

      // Corona pulse around button
      const coA = Math.min(0.55, bolts.length*0.14);
      if (coA>0.01) {
        const cg = ctx.createRadialGradient(mouseX,mouseY,0, mouseX,mouseY,Math.max(W,H)*0.75);
        cg.addColorStop(0,   `rgba(100,160,255,${(coA*0.35).toFixed(2)})`);
        cg.addColorStop(0.35,`rgba(60,100,220,${(coA*0.18).toFixed(2)})`);
        cg.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = cg;
        ctx.beginPath(); ctx.roundRect(0,0,W,H,H/2); ctx.fill();
      }

      for (const b of bolts) {
        const age   = (now-b.born)/b.life;
        // Flash-in (0→0.12) then fade (0.12→1)
        const alpha = age<0.12 ? age/0.12 : 1-((age-0.12)/0.88);
        drawPath(b.main,     alpha,   1.3, '120,180,255', 10);
        for (const br of b.branches)
          drawPath(br, alpha*0.55, 0.7, '100,160,255', 6);
      }

      // Modulate outer box-shadow
      const bi  = Math.min(1, bolts.length*0.28);
      if (bi>0.05) {
        btn.style.boxShadow = [
          `inset 0 1px 0 rgba(255,255,255,0.75)`,
          `0 0 ${Math.round(20*bi)}px ${Math.round(8*bi)}px rgba(80,130,255,${(bi*0.55).toFixed(2)})`,
          `0 0 ${Math.round(55*bi)}px rgba(60,100,255,${(bi*0.28).toFixed(2)})`,
        ].join(', ');
      }
    },
    onLeave() { this.reset(); },
  };
})();

// ════════════════════════════════════════════════════════════
//  💥  SURFACE CRACK
// ════════════════════════════════════════════════════════════
const Crack = (() => {
  let cracks = [];
  let phase  = 'idle';     // 'cracking'|'holding'|'healing'|'idle'
  let animStart=0, healStart=0;
  let ox=0, oy=0;
  const ANIM  = 680, HOLD = 1700, HEAL = 950;

  // Trace one crack arm as a straight-segment polyline with sharp kinks
  function traceCrack(x, y, angle, W, H, strength, depth) {
    const maxLen = Math.sqrt(W*W+H*H) * (0.45+rand(0,0.4)) * strength;
    // 2–5 straight segments, long enough to look like real fracture lines
    const numSegs = 2 + Math.floor(rand(0, depth===0 ? 4 : 3));
    const pts = [{x, y, dist:0}];
    let cx=x, cy=y, len=0, a=angle;

    for (let s=0; s<numSegs; s++) {
      // Sharp directional kink at each joint — this is what makes them look like cracks
      if (s > 0) a += rand(-0.75, 0.75);
      const segLen = (maxLen/numSegs) * rand(0.55, 1.45);
      const ex = cx + Math.cos(a)*segLen;
      const ey = cy + Math.sin(a)*segLen;
      len += segLen;
      pts.push({x:ex, y:ey, dist:len});

      // Sub-branch splits off at the kink joint
      if (depth<3 && s>0 && Math.random() < (depth===0?0.42:0.20)) {
        const ba = a + rand(-1.1, 1.1) * (Math.random()<0.5?1:-1);
        cracks.push(...traceCrack(cx, cy, ba, W, H, strength*(0.28+rand(0,0.18)), depth+1));
      }
      cx=ex; cy=ey;
    }
    return [{pts, totalLen:len, depth}];
  }

  return {
    get phase() { return phase; },

    trigger(x, y) {
      const W=cvs.width, H=cvs.height;
      ox=x; oy=y; cracks=[];
      const n = 5+Math.floor(rand(0,4));
      for (let i=0;i<n;i++) {
        const a = (i/n)*Math.PI*2 + rand(-0.7,0.7);
        cracks.push(...traceCrack(x,y, a, W,H, 1.0, 0));
      }
      phase='cracking'; animStart=performance.now();
      // Schedule heal
      const that = this;
      setTimeout(() => {
        if (phase==='holding') { phase='healing'; healStart=performance.now(); }
      }, ANIM+HOLD);
    },

    render(W, H) {
      if (phase==='idle') return;
      const now = performance.now();
      let progress, alpha;

      if (phase==='cracking') {
        const t = Math.min(1,(now-animStart)/ANIM);
        progress = 1-Math.pow(1-t,3); // ease-out cubic
        alpha    = 1;
        if (t>=1) phase='holding';
      } else if (phase==='holding') {
        progress=1; alpha=1;
      } else { // healing
        progress=1;
        const t = Math.min(1,(now-healStart)/HEAL);
        alpha   = 1-t*t;
        if (alpha<0.015) { phase='idle'; return; }
      }

      // Impact flash
      const flashR = 26*alpha;
      const fg = ctx.createRadialGradient(ox,oy,0, ox,oy,flashR*1.5);
      fg.addColorStop(0,   `rgba(255,230,100,${(alpha*0.95).toFixed(2)})`);
      fg.addColorStop(0.35,`rgba(255,110,20,${(alpha*0.6).toFixed(2)})`);
      fg.addColorStop(1,   'rgba(0,0,0,0)');
      ctx.fillStyle=fg;
      ctx.fillRect(ox-flashR*1.5, oy-flashR*1.5, flashR*3, flashR*3);

      for (const c of cracks) {
        const {pts, totalLen, depth} = c;
        if (pts.length<2) continue;
        const drawLen = progress*totalLen;

        // Build animated path up to drawLen
        const path=[];
        for (let i=0;i<pts.length;i++) {
          if (pts[i].dist<=drawLen) {
            path.push(pts[i]);
          } else if (i>0) {
            const prev=pts[i-1];
            const frac=(drawLen-prev.dist)/(pts[i].dist-prev.dist);
            path.push({x:prev.x+(pts[i].x-prev.x)*frac, y:prev.y+(pts[i].y-prev.y)*frac});
            break;
          }
        }
        if (path.length<2) continue;

        const df = Math.pow(0.82, depth); // depth attenuation
        const outerW = depth===0?6:depth===1?3.5:2;
        const coreW  = depth===0?1.5:0.8;

        ctx.save();
        ctx.globalAlpha = alpha*df;

        // Wide outer glow — lava / magma colour
        ctx.strokeStyle = `rgba(255,${depth===0?90:50},0,0.85)`;
        ctx.lineWidth   = outerW;
        ctx.lineCap = ctx.lineJoin = 'round';
        ctx.shadowColor = 'rgba(255,60,0,1)';
        ctx.shadowBlur  = depth===0?18:9;
        ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
        for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
        ctx.stroke();

        // Mid warm layer
        ctx.strokeStyle = `rgba(255,180,40,0.7)`;
        ctx.lineWidth   = outerW*0.5;
        ctx.shadowBlur  = depth===0?8:4;
        ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
        for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
        ctx.stroke();

        // White/pale yellow core
        ctx.strokeStyle = 'rgba(255,248,200,0.98)';
        ctx.lineWidth   = coreW;
        ctx.shadowBlur  = 0;
        ctx.beginPath(); ctx.moveTo(path[0].x,path[0].y);
        for (let i=1;i<path.length;i++) ctx.lineTo(path[i].x,path[i].y);
        ctx.stroke();

        ctx.restore();
      }

      // Outer box-shadow pulse
      if (alpha>0.05) {
        btn.style.boxShadow = [
          `inset 0 1px 0 rgba(255,255,255,0.6)`,
          `0 0 ${Math.round(30*alpha)}px rgba(255,80,10,${(alpha*0.6).toFixed(2)})`,
          `0 0 ${Math.round(60*alpha)}px rgba(255,40,0,${(alpha*0.25).toFixed(2)})`,
        ].join(', ');
      }
    },

    reset() { phase='idle'; cracks=[]; btn.style.boxShadow=''; applyBtn(); },
  };
})();

// ════════════════════════════════════════════════════════════
//  🌀  PLASMA FIELD
// ════════════════════════════════════════════════════════════
const Plasma = (() => {
  let t = 0;
  return {
    reset() { t=0; },
    render(W, H) {
      t += 0.017;
      // Swirling gradient blobs via screen compositing
      const blobs = [
        {x:W*0.28+Math.sin(t*0.71)*W*0.32, y:H*0.5+Math.cos(t*0.53)*H*0.45, r:W*0.72, c:'180,35,255', a:0.30},
        {x:W*0.72+Math.cos(t*0.87)*W*0.28, y:H*0.5+Math.sin(t*0.61)*H*0.45, r:W*0.65, c:'35,135,255', a:0.27},
        {x:W*0.5+Math.sin(t*1.13+1.4)*W*0.35, y:H*0.4+Math.cos(t*0.79)*H*0.4, r:W*0.52, c:'15,215,180', a:0.23},
        {x:W*0.5+Math.cos(t*0.62+2.2)*W*0.22, y:H*0.6+Math.sin(t*0.95)*H*0.3, r:W*0.45, c:'255,60,140', a:0.20},
        {x:mouseX, y:mouseY, r:W*0.38, c:'255,200,50', a:0.22},
      ];

      ctx.save();
      ctx.globalCompositeOperation='screen';
      for (const b of blobs) {
        const gr=ctx.createRadialGradient(b.x,b.y,0, b.x,b.y,b.r);
        gr.addColorStop(0,    `rgba(${b.c},${b.a.toFixed(2)})`);
        gr.addColorStop(0.42, `rgba(${b.c},${(b.a*0.28).toFixed(2)})`);
        gr.addColorStop(1,    `rgba(${b.c},0)`);
        ctx.fillStyle=gr;
        ctx.beginPath(); ctx.roundRect(0,0,W,H,H/2); ctx.fill();
      }

      // Animated energy tendrils
      for (let i=0;i<5;i++) {
        const hue = ((t*50+i*72)%360);
        const x1  = W*(0.1+0.8*Math.sin(t*0.48+i*1.26));
        const x2  = W*(0.9-0.8*Math.cos(t*0.69+i*1.05));
        const lg  = ctx.createLinearGradient(x1,0,x2,H);
        lg.addColorStop(0,'rgba(0,0,0,0)');
        lg.addColorStop(0.5,`hsla(${hue},100%,70%,0.1)`);
        lg.addColorStop(1,'rgba(0,0,0,0)');
        ctx.fillStyle=lg;
        ctx.beginPath(); ctx.roundRect(0,0,W,H,H/2); ctx.fill();
      }
      ctx.restore();

      // Subtle pulsing outer glow
      const pulseA = 0.25+0.18*Math.sin(t*2.3);
      btn.style.boxShadow = [
        `inset 0 1px 0 rgba(255,255,255,0.75)`,
        `0 0 28px rgba(150,60,255,${pulseA.toFixed(2)})`,
        `0 0 55px rgba(40,120,255,${(pulseA*0.5).toFixed(2)})`,
      ].join(', ');
    },
  };
})();

// ════════════════════════════════════════════════════════════
//  ▓  GLITCH
// ════════════════════════════════════════════════════════════
const Glitch = (() => {
  let nextBurst = 0, burstEnd = 0, bursting = false;
  let scanT = 0;

  function doBurst(W, H) {
    // Horizontal tear strips
    const n = 3+Math.floor(rand(0,7));
    for (let i=0;i<n;i++) {
      const sy  = rand(0,H);
      const sh  = rand(1, H*0.14);
      const off = (Math.random()-0.5)*W*0.18;

      ctx.save();
      ctx.globalCompositeOperation='difference';
      ctx.globalAlpha = rand(0.35,0.75);
      ctx.fillStyle   = `rgba(255,0,${Math.floor(rand(0,120))},1)`;
      ctx.fillRect(off+3, sy, W, sh);
      ctx.fillStyle   = `rgba(0,255,${Math.floor(rand(0,120))},1)`;
      ctx.fillRect(off-3, sy, W, sh*0.7);
      ctx.restore();

      // White noise in the strip
      ctx.save();
      ctx.globalAlpha = rand(0.06,0.2);
      for (let x=0;x<W;x+=2) {
        if (Math.random()<0.45)
          ctx.fillRect(x+off*(Math.random()*0.5), sy+rand(0,sh), 2, 1);
      }
      ctx.restore();
    }

    // Invert flash (1–2 frames worth, faked as a very bright overlay)
    if (Math.random()<0.25) {
      ctx.save();
      ctx.globalCompositeOperation = 'difference';
      ctx.globalAlpha = rand(0.08,0.22);
      ctx.fillStyle = 'white';
      ctx.beginPath(); ctx.roundRect(0,0,W,H,H/2); ctx.fill();
      ctx.restore();
    }
  }

  return {
    reset() {
      nextBurst=0; burstEnd=0; bursting=false;
      btn.classList.remove('glitch-burst');
      btn.style.filter=''; btn.style.boxShadow=''; applyBtn();
    },
    render(W, H) {
      scanT += 0.025;
      const now = performance.now();

      // Scanline overlay (always on in glitch mode)
      ctx.save();
      ctx.globalAlpha = 0.045;
      ctx.fillStyle   = 'rgba(0,0,0,1)';
      for (let y=0;y<H;y+=3) ctx.fillRect(0,y,W,1);
      ctx.restore();

      // Burst management
      if (!bursting && now>nextBurst) {
        bursting  = true;
        burstEnd  = now + rand(80,180);
        nextBurst = burstEnd + rand(280,1600);
        btn.classList.add('glitch-burst');
        btn.style.boxShadow = [
          'inset 0 1px 0 rgba(255,255,255,0.75)',
          '0 0 18px rgba(0,255,120,0.45)',
          '0 0 40px rgba(0,200,100,0.2)',
        ].join(', ');
        setTimeout(() => {
          bursting=false;
          btn.classList.remove('glitch-burst');
          btn.style.filter=''; applyBtn();
        }, burstEnd-now);
      }

      if (bursting) doBurst(W, H);

      // Micro-noise: a handful of random pixels flickering
      ctx.save();
      ctx.globalAlpha=0.08;
      for (let k=0;k<12;k++) {
        const hue=(scanT*120+k*29)%360;
        ctx.fillStyle=`hsla(${hue},100%,80%,1)`;
        ctx.fillRect(rand(0,W), rand(0,H), rand(1,2.5), rand(1,2.5));
      }
      ctx.restore();
    },
  };
})();

// ════════════════════════════════════════════════════════════
//  MAIN RENDER LOOP
// ════════════════════════════════════════════════════════════
function mainLoop() {
  const W=cvs.width, H=cvs.height;
  ctx.clearRect(0,0,W,H);

  // Base cursor spot (skip during glitch — too distracting)
  if (hovering && effectMode!=='glitch') drawSpot();

  switch(effectMode) {
    case 'electric': if(hovering) Electric.render(W,H); break;
    case 'crack':    Crack.render(W,H);                 break;
    case 'plasma':   if(hovering) Plasma.render(W,H);  break;
    case 'glitch':   if(hovering) Glitch.render(W,H);  break;
  }

  const needsLoop =
    hovering ||
    (effectMode==='crack' && Crack.phase!=='idle');

  if (needsLoop) {
    rafId = requestAnimationFrame(mainLoop);
  } else {
    rafId = null;
    ctx.clearRect(0,0,W,H);
    cvs.style.opacity='0';
    if (effectMode==='glitch')   { btn.style.filter=''; btn.classList.remove('glitch-burst'); }
    if (effectMode==='electric') applyBtn();
    if (effectMode==='plasma')   applyBtn();
  }
}
function startLoop() {
  if (!rafId) { cvs.style.opacity='1'; rafId=requestAnimationFrame(mainLoop); }
}

// ── Mouse events ─────────────────────────────────────────
btn.addEventListener('mouseenter', () => {
  hovering = true;
  resize();
  const rgb = hexToRgb(lightenHex(S.baseColor, S.hoverBoost));
  const a   = Math.min(1,(S.baseAlpha+9)/100).toFixed(2);
  btn.style.background = `rgba(${rgb},${a})`;
  startLoop();
});
btn.addEventListener('mousemove', e => {
  const r=btn.getBoundingClientRect();
  mouseX=e.clientX-r.left; mouseY=e.clientY-r.top;
  if (effectMode==='none') updateEdgeGlow();
});
btn.addEventListener('mouseleave', () => {
  hovering = false;
  if (effectMode==='glitch')   Glitch.reset();
  if (effectMode==='electric') Electric.onLeave();
  if (effectMode==='plasma')   Plasma.reset();
  if (effectMode!=='crack') {
    if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
    ctx.clearRect(0,0,cvs.width,cvs.height);
    cvs.style.opacity='0';
    applyBtn();
  }
});
btn.addEventListener('mousedown', e => {
  if (effectMode!=='crack') return;
  const r=btn.getBoundingClientRect();
  Crack.trigger(e.clientX-r.left, e.clientY-r.top);
  startLoop();
});

// ── Effect chip selection ─────────────────────────────────
const HINTS = {
  none:     'Standard hover glow — use controls above to tweak.',
  electric: 'Hover to trigger recursive lightning arcs across the button surface.',
  crack:    'Click the button to shatter it. Watch the lava glow, then heal.',
  plasma:   'Hover to activate swirling plasma energy with additive blending.',
  glitch:   'Hover for periodic RGB-split, scanlines, and digital corruption bursts.',
};
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    switch(effectMode) {
      case 'electric': Electric.reset(); break;
      case 'crack':    Crack.reset();    break;
      case 'plasma':   Plasma.reset();   break;
      case 'glitch':   Glitch.reset();   break;
    }
    if (rafId) { cancelAnimationFrame(rafId); rafId=null; }
    ctx.clearRect(0,0,cvs.width,cvs.height);
    cvs.style.opacity='0';
    btn.style.filter=''; btn.classList.remove('glitch-burst');

    document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
    chip.classList.add('active');
    effectMode = chip.dataset.effect;
    document.getElementById('fx-hint').textContent = HINTS[effectMode]||'';
    applyBtn();
    // Re-start loop if hovering
    if (hovering) startLoop();
  });
});

// ── Controls wiring ───────────────────────────────────────
function wire(id, key, dId, fmt) {
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener('input', () => {
    S[key] = typeof S[key]==='number' ? parseFloat(el.value) : el.value;
    if(dId) document.getElementById(dId).textContent=fmt(el.value);
    applyBtn();
  });
}
function wireColor(id, key, hexId) {
  const el=document.getElementById(id); if(!el) return;
  el.addEventListener('input', () => {
    S[key]=el.value;
    document.getElementById(hexId).textContent=el.value;
    applyBtn();
  });
}
wire('s-base-a',  'baseAlpha',  'v-base-a',  v=>v+'%');
wire('s-hover-b', 'hoverBoost', 'v-hover-b', v=>'+'+v+'%');

// ── Reset ─────────────────────────────────────────────────
function resetDefaults() {
  Object.assign(S, DEFAULTS);
  const map={
    's-base-a':DEFAULTS.baseAlpha,'s-hover-b':DEFAULTS.hoverBoost,
    's-spot':DEFAULTS.spotAlpha,  's-radius':DEFAULTS.spotRadius,
    's-outer':DEFAULTS.outerGlow, 's-edge':DEFAULTS.edgeAlpha,
    's-spread':DEFAULTS.edgeSpread,'s-fsize':DEFAULTS.fontSize,
    's-fweight':DEFAULTS.fontWeight,'s-tracking':DEFAULTS.tracking,
    's-border-a':DEFAULTS.borderAlpha,'s-padh':DEFAULTS.padH,
    's-padv':DEFAULTS.padV,
  };
  for(const [id,val] of Object.entries(map)){
    const el=document.getElementById(id); if(el) el.value=val;
  }
  document.getElementById('c-base').value   =DEFAULTS.baseColor;
  document.getElementById('c-glow').value   =DEFAULTS.glowColor;
  document.getElementById('c-font').value   =DEFAULTS.fontColor;
  document.getElementById('c-border').value =DEFAULTS.borderColor;
  document.getElementById('v-base-a').textContent =DEFAULTS.baseAlpha+'%';
  document.getElementById('v-hover-b').textContent='+'+DEFAULTS.hoverBoost+'%';
  document.getElementById('v-spot').textContent   =DEFAULTS.spotAlpha+'%';
  document.getElementById('v-radius').textContent =DEFAULTS.spotRadius+'%';
  document.getElementById('v-outer').textContent  =DEFAULTS.outerGlow+'%';
  document.getElementById('v-edge').textContent   =DEFAULTS.edgeAlpha+'%';
  document.getElementById('v-spread').textContent =DEFAULTS.edgeSpread+'px';
  document.getElementById('v-fsize').textContent  =DEFAULTS.fontSize+'px';
  document.getElementById('v-fweight').textContent=DEFAULTS.fontWeight;
  document.getElementById('v-tracking').textContent=(DEFAULTS.tracking/100).toFixed(2)+'em';
  document.getElementById('v-border-a').textContent=DEFAULTS.borderAlpha+'%';
  document.getElementById('v-padh').textContent   =DEFAULTS.padH+'px';
  document.getElementById('v-padv').textContent   =DEFAULTS.padV+'px';
  document.getElementById('h-base').textContent   =DEFAULTS.baseColor;
  document.getElementById('h-glow').textContent   =DEFAULTS.glowColor;
  document.getElementById('h-font').textContent   =DEFAULTS.fontColor;
  document.getElementById('h-border').textContent =DEFAULTS.borderColor;
  applyBtn();
}

// ── Export / Download ──────────────────────────────────────
function buildCSS() {
  const a    = (S.baseAlpha/100).toFixed(2);
  const rgb  = hexToRgb(S.baseColor);
  const ba   = (S.borderAlpha/100).toFixed(2);
  const brg  = hexToRgb(S.borderColor);
  const glowRgb = hexToRgb(S.glowColor);
  const oa   = (S.outerGlow/100).toFixed(2);
  const tracking = (S.tracking/100).toFixed(2);
  const hoverRgb = hexToRgb(lightenHex(S.baseColor, S.hoverBoost));
  const hoverA   = Math.min(1,(S.baseAlpha+9)/100).toFixed(2);

  return `/* ── Button — exported from Button Tweaker ── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  padding: ${S.padV}px ${S.padH}px;
  border-radius: 100px;
  background: rgba(${rgb}, ${a});
  border: 1px solid rgba(${brg}, ${ba});
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.6);
  color: ${S.fontColor};
  font-size: ${S.fontSize}px;
  font-weight: ${S.fontWeight};
  letter-spacing: ${tracking}em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.15s ease, box-shadow 0.12s ease, transform 0.12s ease;
}
.btn:hover {
  background: rgba(${hoverRgb}, ${hoverA});
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.75),
    0 0 24px 8px rgba(${glowRgb}, ${oa});
}
.btn:active {
  transform: scale(0.97);
}`;
}

function buildHTML() {
  const css = buildCSS();
  return `<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>

function triggerDownload(filename, content, mime) {
  const blob = new Blob([content], {type: mime});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  const hint = document.getElementById('export-hint');
  hint.textContent = `✓ ${filename} saved`;
  hint.classList.add('show');
  setTimeout(() => hint.classList.remove('show'), 2800);
}

function downloadCSS()  { triggerDownload('button.css',  buildCSS(),  'text/css'); }
function downloadHTML() { triggerDownload('button.html', buildHTML(), 'text/html'); }
